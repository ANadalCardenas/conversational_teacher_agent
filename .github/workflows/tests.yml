name: Run Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t conversational_teacher_agent-tests ./backend

      - name: Run tests
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            conversational_teacher_agent-tests \
            python3 -m pytest tests/ -v --no-header
